<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Filter Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8f9;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.filter-btn{

padding:12px 22px;

border:none;

border-radius:30px;

background:white;

color:#27A5AD;

font-size:15px;

font-weight:600;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.1);

transition:.35s;

}

.filter-btn:hover{

transform:translateY(-4px);

background:#27A5AD;

color:white;

}

.filter-btn.active{

background:#27A5AD;

color:white;

transform:scale(1.05);

}

#customRange{

display:none;

margin-bottom:30px;

gap:15px;

align-items:center;

animation:fade .4s;

}

input[type=date]{

padding:12px;

border-radius:10px;

border:1px solid #ddd;

font-size:15px;

}

.apply{

background:#27A5AD;

color:white;

border:none;

padding:12px 25px;

border-radius:10px;

cursor:pointer;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

}

.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.title{

color:#666;

margin-bottom:10px;

}

.value{

font-size:30px;

font-weight:600;

color:#27A5AD;

transition:.3s;

}

.fade{

opacity:0;

transform:scale(.9);

}

@keyframes fade{

from{

opacity:0;

transform:translateY(-15px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="filters">

<button class="filter-btn active" onclick="changeData('yesterday',this)">Yesterday</button>

<button class="filter-btn" onclick="changeData('week',this)">Last Week</button>

<button class="filter-btn" onclick="changeData('month',this)">Last Month</button>

<button class="filter-btn" onclick="showCalendar(this)">Custom Date Range</button>

</div>

<div id="customRange">

<input type="date" id="start">

<input type="date" id="end">

<button class="apply" onclick="applyCustom()">Apply</button>

</div>

<div class="cards">

<div class="card">

<div class="title">Expected Generation</div>

<div class="value" id="expected">1245 MWh</div>

</div>

<div class="card">

<div class="title">Actual Generation</div>

<div class="value" id="actual">1182 MWh</div>

</div>

<div class="card">

<div class="title">Generation Loss</div>

<div class="value" id="loss">63 MWh</div>

</div>

<div class="card">

<div class="title">PR</div>

<div class="value" id="pr">82.6%</div>

</div>

<div class="card">

<div class="title">Plant Health</div>

<div class="value" id="health">96%</div>

</div>

</div>

</div>

<script>

const dataset={

yesterday:{

expected:"1245 MWh",

actual:"1182 MWh",

loss:"63 MWh",

pr:"82.6%",

health:"96%"

},

week:{

expected:"8450 MWh",

actual:"8122 MWh",

loss:"328 MWh",

pr:"84.2%",

health:"95.7%"

},

month:{

expected:"36450 MWh",

actual:"35010 MWh",

loss:"1440 MWh",

pr:"84.9%",

health:"96.1%"

}

};

function animate(id,value){

const el=document.getElementById(id);

el.classList.add("fade");

setTimeout(()=>{

el.innerHTML=value;

el.classList.remove("fade");

},200);

}

function update(d){

animate("expected",d.expected);

animate("actual",d.actual);

animate("loss",d.loss);

animate("pr",d.pr);

animate("health",d.health);

}

function changeData(type,btn){

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

document.getElementById("customRange").style.display="none";

update(dataset[type]);

}

function showCalendar(btn){

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

document.getElementById("customRange").style.display="flex";

}

function applyCustom(){

const s=document.getElementById("start").value;

const e=document.getElementById("end").value;

if(!s||!e){

alert("Please select both dates.");

return;

}

update({

expected:"5120 MWh",

actual:"4892 MWh",

loss:"228 MWh",

pr:"83.8%",

health:"95.4%"

});

}

</script>

</body>
</html>
