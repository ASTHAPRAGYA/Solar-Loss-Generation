<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar Generation Loss Optimizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#27A5AD,#0b5f66);

overflow:hidden;

}

body:before{

content:'';
position:absolute;
width:700px;
height:700px;
background:white;
opacity:.08;
border-radius:50%;
top:-250px;
right:-200px;

}

body:after{

content:'';
position:absolute;
width:500px;
height:500px;
background:white;
opacity:.05;
border-radius:50%;
bottom:-180px;
left:-180px;

}

.container{

width:420px;
background:white;
padding:40px;
border-radius:20px;

box-shadow:0 15px 45px rgba(0,0,0,.25);

z-index:5;

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

text-align:center;
font-size:60px;

}

h1{

text-align:center;
font-size:26px;
margin-top:10px;
color:#27A5AD;

}

.subtitle{

text-align:center;
margin-top:8px;
color:gray;
font-size:14px;

}

.inputBox{

margin-top:25px;

}

.inputBox label{

font-size:14px;
font-weight:600;

}

.inputBox input{

width:100%;
padding:14px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
font-size:15px;

transition:.3s;

}

.inputBox input:focus{

border-color:#27A5AD;

}

.passwordBox{

position:relative;

}

.eye{

position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;

}

.options{

display:flex;
justify-content:space-between;
margin-top:18px;
font-size:14px;

}

button{

width:100%;
padding:15px;

margin-top:25px;

background:#27A5AD;

border:none;

border-radius:10px;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1e8c93;

}

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:gray;

}

.loading{

display:none;

text-align:center;

margin-top:20px;

color:#27A5AD;

font-weight:600;

}

.spinner{

margin:auto;

margin-bottom:10px;

width:40px;

height:40px;

border:5px solid #ddd;

border-top:5px solid #27A5AD;

border-radius:50%;

animation:spin .8s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.error{

margin-top:15px;

color:red;

text-align:center;

display:none;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

☀

</div>

<h1>Solar Generation Loss Optimizer</h1>

<p class="subtitle">

Utility Scale Solar Monitoring Platform

</p>

<div class="inputBox">

<label>Username</label>

<input
type="text"
id="username"
placeholder="Enter Username">

</div>

<div class="inputBox">

<label>Password</label>

<div class="passwordBox">

<input
type="password"
id="password"
placeholder="Enter Password">

<span class="eye" onclick="togglePassword()">👁</span>

</div>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#" style="text-decoration:none;color:#27A5AD">

Forgot Password?

</a>

</div>

<button onclick="login()">

LOGIN

</button>

<div class="error" id="error">

Invalid Username or Password

</div>

<div class="loading" id="loading">

<div class="spinner"></div>

Logging in...

</div>

<div class="footer">

Designed for Utility Scale Solar Plants

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

let error=document.getElementById("error");

let loading=document.getElementById("loading");

if(user==="Admin@123" && pass==="Admin@123"){

error.style.display="none";

loading.style.display="block";

setTimeout(function(){

window.location="dashboard.html";

},1800);

}

else{

error.style.display="block";

}

}

</script>

</body>
</html>
